{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <!-- Title -->
          <h3 class="text-center text-success fw-bold mb-4">
            Welcome to FoodRanger 🍔
          </h3>

          <!-- Messages -->
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger text-center">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <!-- Login Form -->
          <form method="post">
            {% csrf_token %}

            <!-- Phone -->
            <input class="form-control mb-3"
                   type="tel"
                   name="phone"
                   placeholder="📞 Enter Phone Number"
                   required>

            <!-- Password -->
            <input class="form-control mb-3"
                   type="password"
                   name="password"
                   placeholder="🔒 Enter Password"
                   required>

            <!-- Login Button -->
            <button class="btn btn-success w-100 rounded-3 fw-semibold">
              Login
            </button>
          </form>

          <!-- Register Link -->
          <p class="text-center mt-3 mb-0">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-success fw-semibold text-decoration-none">
              Register here
            </a>
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
